<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>WebSocket 聊天室</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #chat-box { width: 100%; height: 400px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; }
        #message-input { width: 80%; padding: 5px; }
        #send-button { padding: 5px 10px; }
        p { margin: 5px 0; }
    </style>
</head>
<body>
<h2>WebSocket 实时聊天室</h2>
<div id="chat-box"></div>
<input type="text" id="message-input" placeholder="输入消息" />
<button id="send-button">发送</button>

<script>
    // 创建 WebSocket 连接
    const socket = new WebSocket("ws://localhost:8080/websocket/chat");

    // 连接建立
    socket.onopen = function() {
        console.log("WebSocket连接已建立");
        addMessage("系统提示：已连接到服务器");
    };

    // 接收消息
    socket.onmessage = function(event) {
        addMessage(event.data);
    };

    // 连接关闭
    socket.onclose = function() {
        console.log("WebSocket连接已关闭");
        addMessage("系统提示：连接已关闭");
    };

    // 连接错误
    socket.onerror = function(error) {
        console.log("WebSocket连接发生错误", error);
        addMessage("系统提示：连接发生错误");
    };

    // 点击发送按钮
    document.getElementById("send-button").onclick = function() {
        sendMessage();
    };

    // 回车发送消息
    document.getElementById("message-input").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });

    // 发送消息函数
    function sendMessage() {
        const input = document.getElementById("message-input");
        const message = input.value.trim();
        if (message) {
            socket.send(message);
            input.value = "";
        }
    }

    // 在聊天框显示消息
    function addMessage(msg) {
        const chatBox = document.getElementById("chat-box");
        const p = document.createElement("p");
        p.textContent = msg;
        chatBox.appendChild(p);
        chatBox.scrollTop = chatBox.scrollHeight; // 自动滚动到底部
    }
</script>
</body>
</html>
